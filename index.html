    <script>
        // --- OBFUSCATED CORE ENGINE ---
        let _p, _idx = 0;
        const _lib = [{i:"KhqNTjbQ71A", n:"CHRISTMAS"}, {i:"eCRG6UAsDgc", n:"VAR VAR"}, {i:"x5Oag4hISgU", n:"RASPUTIN"}, {i:"gelwwYuYGn0", n:"TWO OF US"}];

        window.renderCore = () => {
            const c = document.getElementById('bg-canvas');
            const x = c.getContext('2d');
            let p = [];
            const t = ["EZ", "WIN", "𝐋𝐃✦", "ROOT"];
            const resize = () => { c.width = window.innerWidth; c.height = window.innerHeight; };
            window.onresize = resize; resize();
            for(let i=0; i<100; i++) p.push({x: Math.random()*c.width, y: Math.random()*c.height, s: Math.random()*15+10, v: Math.random()*0.4+0.1, o: Math.random()*0.2, txt: t[Math.floor(Math.random()*t.length)]});
            const draw = () => {
                x.clearRect(0,0,c.width,c.height);
                p.forEach(s => {
                    x.fillStyle = `rgba(255,255,255,${s.o})`;
                    x.font = `${s.s}px monospace`;
                    x.fillText(s.txt, s.x, s.y);
                    s.y -= s.v; if(s.y < -20) s.y = c.height+20;
                });
                requestAnimationFrame(draw);
            };
            draw();
        };

        function onYouTubeIframeAPIReady() {
            _p = new YT.Player('player', { height: '1', width: '1', videoId: _lib[0].i, playerVars: { 'autoplay': 0, 'controls': 0 }, events: { 'onReady': (e) => e.target.setVolume(30) } });
        }

        function triggerMainFlow() {
            const f = document.getElementById('flash-bang');
            f.style.opacity = '1';
            document.getElementById('enter-overlay').style.display = 'none';
            setTimeout(() => {
                document.body.classList.add('loaded');
                if(_p) _p.playVideo();
                let op = 1;
                const iv = setInterval(() => {
                    op -= 0.02; f.style.opacity = op;
                    if(op <= 0) { clearInterval(iv); f.style.display = 'none'; }
                }, 30);
            }, 600);
        }

        function trackChange(n) {
            _idx = n; _p.loadVideoById(_lib[n].i);
            const items = document.querySelectorAll('.playlist-item');
            items.forEach((el, i) => el.classList.toggle('playing', i === n));
            const hud = document.getElementById('audio-hud');
            hud.classList.add('show');
            setTimeout(() => hud.classList.remove('show'), 1500);
        }

        function uiAction(type) {
            if(type === 'menu') document.getElementById('playlist-menu').classList.toggle('active');
            if(type === 'mute') { if(_p.isMuted()) { _p.unMute(); document.getElementById('panel-icon').className = "fa-solid fa-volume-high"; } else { _p.mute(); document.getElementById('panel-icon').className = "fa-solid fa-volume-xmark"; } }
            if(type === 'next') { _idx = (_idx + 1) % _lib.length; trackChange(_idx); }
            if(type === 'prev') { _idx = (_idx - 1 + _lib.length) % _lib.length; trackChange(_idx); }
        }

        document.getElementById('vol-ctrl').addEventListener('input', (e) => _p.setVolume(e.target.value));
    </script>
