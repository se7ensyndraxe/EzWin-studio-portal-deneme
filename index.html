<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWIN STUDIO | PRO PORTAL</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        #loader { color: white; font-family: sans-serif; letter-spacing: 5px; font-size: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loader">SECURE BOOTING...</div>
    <div id="ezwin-app"></div>

    <script>
        (function() {
            // --- GÜVENLİK DUVARI ---
            const _u = window.location.href.toLowerCase();
            const _h = window.location.hostname.toLowerCase();
            const _k = "se7ensyndraxe";

            if (!(_u.includes(_k) || _h === "localhost" || _h === "127.0.0.1" || _h === "")) {
                window.location.replace("https://www.youtube.com/@EzWinStudio");
                return;
            }

            // --- EFSANE TASARIM DATASI (TAM SÜRÜM) ---
            // Bu kısım senin o ilk istediğin tüm görselliği içeriyor.
            const _fullDesign = `
            <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
            <style>
                @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Fira+Code:wght@400;700&display=swap');
                * { margin: 0; padding: 0; box-sizing: border-box; text-transform: uppercase; user-select: none; }
                body { background: #080808; color: white; font-family: 'Poppins', sans-serif; height: 100vh; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }
                .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: -1; }
                .container { text-align: center; width: 100%; max-width: 900px; padding: 20px; }
                .studio-title { font-size: 55px; font-weight: 900; letter-spacing: -2px; background: linear-gradient(90deg, #444, #fff, #444); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shine 4s linear infinite; }
                @keyframes shine { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
                .layout { display: flex; align-items: center; gap: 20px; margin-top: 40px; }
                .col { flex: 1; display: flex; flex-direction: column; gap: 15px; }
                .center { flex: 1.2; }
                .btn { height: 60px; border-radius: 12px; text-decoration: none; font-weight: 800; display: flex; align-items: center; justify-content: center; transition: 0.4s; font-size: 11px; letter-spacing: 1px; border: 1px solid rgba(255,255,255,0.1); }
                .white { background: #fff; color: #000; }
                .dark { background: rgba(255,255,255,0.05); color: #fff; }
                .main-btn { background: #000; color: #fff; border: 2px solid #fff; animation: pulseGlow 2s infinite; height: 70px; }
                @keyframes pulseGlow { 0% { box-shadow: 0 0 5px #fff; } 50% { box-shadow: 0 0 20px #fff; } 100% { box-shadow: 0 0 5px #fff; } }
                .btn:hover { transform: translateY(-5px) scale(1.02); }
                .footer-tag { margin-top: 50px; font-size: 9px; opacity: 0.3; letter-spacing: 5px; }
            </style>
            <div class="bg-glow"></div>
            <div class="container">
                <h1 class="studio-title">EZWIN STUDIO</h1>
                <p style="font-size: 9px; opacity: 0.4; letter-spacing: 6px;">DESIGNED BY LD✦ SE7ENSYNDRAXE</p>
                <div class="layout">
                    <div class="col">
                        <a href="https://discord.gg/CnapcSfNq5" class="btn white">MUSIC SERVER</a>
                        <a href="https://discord.gg/G7s3kgtSJX" class="btn white">ACCOUNT SERVICES</a>
                    </div>
                    <div class="col center">
                        <a href="https://www.youtube.com/@EzWinStudio" class="btn dark"><i class="fab fa-youtube"></i>&nbsp; EZWIN STUDIO</a>
                        <a href="https://discord.gg/xDydNyHnUd" class="btn main-btn">JOIN THE STUDIO</a>
                        <a href="https://www.youtube.com/@EzWinMusic" class="btn dark"><i class="fab fa-youtube"></i>&nbsp; EZWIN MUSIC</a>
                    </div>
                    <div class="col">
                        <a href="https://discord.gg/jwtmt46ZPb" class="btn white">UNCOPYLOCKED</a>
                        <a href="https://discord.gg/m2uDdfUEdf" class="btn white">CHEAT SERVER</a>
                    </div>
                </div>
                <div class="footer-tag">POWERED BY EZWINSTUDIO</div>
            </div>
            `;

            window.onload = function() {
                setTimeout(() => {
                    document.getElementById('loader').remove();
                    // Shadow DOM ile içeriği korumaya alıyoruz
                    const root = document.getElementById('ezwin-app');
                    const shadow = root.attachShadow({mode: 'closed'});
                    shadow.innerHTML = _fullDesign;
                    
                    // Koruma kalkanı
                    _shield();
                }, 1000);
            };

            function _shield() {
                document.onkeydown = e => {
                    if (e.keyCode == 123 || (e.ctrlKey && [83, 85, 73, 74].includes(e.keyCode))) return false;
                };
                setInterval(() => { (function(){return false;})['constructor']('debugger')(); }, 50);
            }
        })();
    </script>
</body>
</html>
