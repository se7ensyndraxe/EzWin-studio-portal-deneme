<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZWIN STUDIO | PRO PORTAL</title>
    <script>
        // 1. ANINDA KONTROL (HIÇBEKLEMEDEN)
        (function() {
            // URL'yi al ve küçük harfe çevir (Hata payını yok eder)
            var fullUrl = window.location.href.toLowerCase();
            
            // BEYAZ LİSTE KELİMESİ (Senin kullanıcı adın)
            var key = "se7ensyndraxe";

            // Eğer URL içinde adın geçmiyorsa VE yerel test ortamı değilse şutla
            var allowed = fullUrl.indexOf(key) > -1 || 
                          fullUrl.indexOf("localhost") > -1 || 
                          fullUrl.indexOf("127.0.0.1") > -1 ||
                          fullUrl.indexOf("file://") > -1;

            if (!allowed) {
                window.location.replace("https://www.youtube.com/@EzWinStudio");
            }
        })();
    </script>
    <style>
        /* TASARIM */
        body {
            background: #080808;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }
        .box {
            border: 1px solid rgba(255,255,255,0.2);
            padding: 40px;
            text-align: center;
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 40px; letter-spacing: 8px; margin: 0; color: #fff; }
        p { font-size: 10px; letter-spacing: 4px; opacity: 0.5; margin-top: 10px; }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-size: 11px;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px #fff; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div class="box">
        <h1>EZWIN STUDIO</h1>
        <p>SYSTEM ACCESS: GRANTED</p>
        <a href="https://discord.gg/xDydNyHnUd" target="_blank" class="btn">DISCORD SERVER</a>
    </div>

    <script>
        // SAĞ TIK VE KAYDETME ENGELLERİ (V7)
        window.addEventListener('keydown', function(e) {
            // F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S engelleme
            if (e.keyCode == 123 || 
                (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74 || e.keyCode == 67)) ||
                (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83 || e.keyCode == 80))) {
                e.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
