<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EZWIN STUDIO | FINAL SAFE</title>
    <style>
        /* Varsayılan olarak her şeyi gizle */
        #main-content { display: none; }
        #error-screen { 
            display: none; background: #000; color: red; 
            height: 100vh; flex-direction: column; 
            align-items: center; justify-content: center; font-family: sans-serif;
        }
        body { background: #080808; color: white; margin: 0; font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body>

    <div id="error-screen">
        <h1>⚠️ ACCESS DENIED</h1>
        <p>BU PANEL ÇALINTIDIR VEYA YETKİSİZ ALANDA ÇALIŞIYOR.</p>
    </div>

    <div id="main-content">
        <div style="text-align: center; padding-top: 20vh;">
            <h1 style="letter-spacing: 10px;">EZWIN STUDIO</h1>
            <p style="opacity: 0.5;">WELCOME, SE7ENSYNDRAXE</p>
            <br>
            <a href="https://discord.gg/xDydNyHnUd" style="color: black; background: white; padding: 15px 30px; text-decoration: none; font-weight: bold;">DISCORD'A KATIL</a>
        </div>
    </div>

    <script>
        (function() {
            // URL KONTROLÜ
            var currentUrl = window.location.href.toLowerCase();
            var isLocal = currentUrl.indexOf("localhost") > -1 || currentUrl.indexOf("127.0.0.1") > -1 || currentUrl.indexOf("file://") > -1;
            var isGithub = currentUrl.indexOf("se7ensyndraxe") > -1;

            if (isLocal || isGithub) {
                // EĞER GÜVENLİYSE PANELİ GÖSTER
                document.getElementById('main-content').style.display = 'block';
            } else {
                // EĞER GÜVENLİ DEĞİLSE HATA EKRANINI GÖSTER (YÖNLENDİRME YAPMA!)
                document.getElementById('error-screen').style.display = 'flex';
                // Konsola hata bas (F12'de görünür)
                console.error("Yetkisiz Erişim Engellendi.");
            }
        })();

        // Sağ tık engeli
        document.oncontextmenu = () => false;
    </script>
</body>
</html>
