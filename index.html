    <script>
        // --- ARKA PLAN ANİMASYONU ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let shapes = [];
        function initBG() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            shapes = [];
            for(let i=0; i<80; i++) {
                shapes.push({
                    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
                    size: Math.random()*15+5, speed: Math.random()*0.5+0.1,
                    op: Math.random()*0.3
                });
            }
        }
        function drawBG() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(255,255,255,";
            shapes.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size/2, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${s.op})`; ctx.fill();
                s.y -= s.speed; if(s.y < -20) s.y = canvas.height+20;
            });
            requestAnimationFrame(drawBG);
        }
        window.addEventListener('resize', initBG);
        initBG(); drawBG();

        // --- MÜZİK ÇALAR ---
        let player;
        const tracks = ["KhqNTjbQ71A", "eCRG6UAsDgc", "x5Oag4hISgU"];
        let current = 0;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '1', width: '1', videoId: tracks[current],
                playerVars: { 'autoplay': 0, 'controls': 0 },
                events: { 'onReady': (e) => e.target.setVolume(30) }
            });
        }
        function toggleMute() {
            if(player.isMuted()) { player.unMute(); document.getElementById('mute-btn').className="fa-solid fa-volume-high"; }
            else { player.mute(); document.getElementById('mute-btn').className="fa-solid fa-volume-xmark"; }
        }
        function nextTrack() { current=(current+1)%tracks.length; player.loadVideoById(tracks[current]); }
        function prevTrack() { current=(current-1+tracks.length)%tracks.length; player.loadVideoById(tracks[current]); }
        document.getElementById('vol-slider').addEventListener('input', (e) => player.setVolume(e.target.value));
    </script>
